<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Neon Grid Snake — Linked List (Fixed Speed & Responsive)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1:#06101f;
      --bg-2:#020814;
      --neon:#00ffbb;
      --snake-head:#4CFF66;
      --snake-body:#16C76F;
      --food:#FF3864;
    }

    html,body{height:100%; margin:0; font-family:'Orbitron', system-ui, Arial, sans-serif;}
    body {
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      background: radial-gradient(circle at center, var(--bg-1), var(--bg-2) 80%);
      color:var(--neon);
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* animated subtle grid in background */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(120deg, rgba(0,255,180,0.03) 1px, transparent 1px),
        linear-gradient(60deg, rgba(0,255,180,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      transform: translateY(0);
      animation: moveGrid 18s linear infinite;
      z-index:0;
    }
    @keyframes moveGrid { from { transform: translateY(0) } to { transform: translateY(40px) } }

    .app {
      z-index:1;
      display:flex;
      gap:28px;
      align-items:center;
      padding:24px;
      width:100%;
      box-sizing:border-box;
      justify-content:center;
    }

    /* canvas style (game board) */
    #game {
      background: rgba(0,30,35,0.55);
      border-radius:18px;
      border: 2px solid rgba(0,255,180,0.22);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.6),
        0 0 30px rgba(0,255,180,0.08) inset,
        0 0 18px rgba(0,255,180,0.06);
      image-rendering: pixelated;
      display:block;
      touch-action: none; /* better for swipe */
    }

    .sidebar {
      display:flex;
      flex-direction:column;
      gap:14px;
      width:260px;
      min-width:220px;
    }
    .card {
      background: rgba(0,12,18,0.45);
      border-radius:14px;
      padding:16px;
      border:1px solid rgba(0,255,180,0.18);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 12px rgba(0,255,180,0.06);
      backdrop-filter: blur(6px);
    }
    .card h3 { margin:0 0 8px 0; font-size:16px; color:#b3ffdc; text-align:center; }
    .score-large { text-align:center; font-size:36px; color:var(--snake-head); text-shadow: 0 0 12px rgba(76,255,102,0.6); }

    .controls {
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
    }

    .btn {
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      background: linear-gradient(180deg, rgba(0,255,180,0.04), rgba(0,255,180,0.01));
      border: 1px solid rgba(0,255,180,0.12);
      color:var(--neon);
      text-align:center;
      cursor:pointer;
      font-weight:700;
      transition: transform .12s ease, box-shadow .12s ease;
      user-select:none;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,255,180,0.12); }
    .btn:active { transform: translateY(-1px); }

    .small {
      font-size:13px;
      opacity:0.95;
      color:#c8fff0;
    }

    .kbd {
      display:inline-block;
      padding:4px 8px;
      border-radius:6px;
      background: rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.03);
      font-weight:700;
      color:var(--neon);
    }

    .muted { opacity:0.75; font-size:13px; text-align:center; }

    @media (max-width:880px){
      .app{ flex-direction:column; gap:18px; padding:14px; }
      .sidebar{ width:100%; max-width:720px; flex-direction:row; gap:12px; justify-content:center; }
      .card{ flex:1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar" aria-hidden="false">
      <div class="card">
        <h3>NEON GRID</h3>
        <div style="text-align:center">
          <div class="score-large" id="scoreDisplay">0</div>
          <div class="muted small">Score</div>
        </div>
      </div>

      <div class="card" style="display:flex;flex-direction:column;align-items:center; gap:8px;">
        <h3>Controls</h3>
        <div class="small muted">
          <div><span class="kbd">↑</span> / <span class="kbd">W</span> — Up</div>
          <div><span class="kbd">↓</span> / <span class="kbd">S</span> — Down</div>
          <div><span class="kbd">←</span> / <span class="kbd">A</span> — Left</div>
          <div><span class="kbd">→</span> / <span class="kbd">D</span> — Right</div>
          <div style="margin-top:6px;"><span class="kbd">Space</span> — Pause • <span class="kbd">R</span> — Restart</div>
        </div>
      </div>

      <div class="card controls">
        <button class="btn" id="restartBtn">🔄 Restart</button>
        <button class="btn" id="pauseBtn">⏸ Pause</button>
        <div style="font-size:12px; color: #bfffe6; opacity:0.9; text-align:center; margin-top:6px;">Theme: Neon Grid — Linked List</div>
      </div>
    </div>

    <canvas id="game" aria-label="Snake game board"></canvas>
  </div>

<script>
/* ---------------------------
  Responsive Neon Snake (linked list)
  - Fixed slow speed (FPS = 7)
  - Responsive canvas and cell size
  - Works on mobile (swipe) and desktop
----------------------------*/

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: false });
const scoreDisplay = document.getElementById('scoreDisplay');
const restartBtn = document.getElementById('restartBtn');
const pauseBtn = document.getElementById('pauseBtn');

const COLS = 30;
const ROWS = 30;
let CELL = 20; // will be recalculated on resize

// Theme colors
const BG = 'rgba(0,30,35,0.55)';
const GRID_LINE = 'rgba(0,255,180,0.06)';
const SNAKE_HEAD = '#4CFF66';
const SNAKE_BODY = '#16C76F';
const FOOD_COLOR = '#FF3864';

// Game variables & linked-list node
function Node(x,y,next=null){ return { x, y, next }; }
let head = null;
let direction = { x: 1, y: 0 };
let nextDirection = { x: 1, y: 0 };
let food = null;
let grow = 0;
let score = 0;
let running = true;
let tickInterval = null;
const FPS = 7; // <--- Fixed, slow & comfortable on all devices

// Resize canvas responsively and compute CELL
function resizeCanvas(){
  // choose size based on viewport while leaving space for sidebar
  const maxBoard = Math.min(window.innerWidth * 0.72, window.innerHeight * 0.78, 720);
  const size = Math.max(280, Math.floor(maxBoard)); // min 280px to remain playable
  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  // compute CELL to be integer
  CELL = Math.floor(canvas.width / COLS);
  // ensure crisp pixel rendering
  ctx.imageSmoothingEnabled = false;
  draw(); // redraw after resize
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Utilities
function randomCell(){ return { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) }; }
function isOnSnake(x,y,skipHead=false){
  let cur = head;
  if (skipHead && cur) cur = cur.next;
  while(cur){
    if (cur.x===x && cur.y===y) return true;
    cur = cur.next;
  }
  return false;
}

// Initialize snake in center
function initSnake(length=4){
  const startX = Math.floor(COLS/2);
  const startY = Math.floor(ROWS/2);
  head = Node(startX,startY);
  let cur = head;
  for (let i=1;i<length;i++){
    cur.next = Node(startX - i, startY);
    cur = cur.next;
  }
}

// Place food on free cell
function placeFood(){
  for (let attempts=0; attempts<2000; attempts++){
    const c = randomCell();
    if (!isOnSnake(c.x,c.y)){
      food = c;
      return;
    }
  }
  food = null;
}

// Advance game logic by one step
function advance(){
  direction = nextDirection;
  const newX = head.x + direction.x;
  const newY = head.y + direction.y;

  // wall collision
  if (newX < 0 || newX >= COLS || newY < 0 || newY >= ROWS){
    gameOver();
    return;
  }

  // self collision
  if (isOnSnake(newX,newY,false)){
    gameOver();
    return;
  }

  // insert new head
  const newHead = Node(newX,newY,head);
  head = newHead;

  // eat food?
  if (food && newX === food.x && newY === food.y){
    score++;
    scoreDisplay.textContent = score;
    grow += 1;
    placeFood();
  }

  // remove tail if not growing
  if (grow <= 0){
    // walk until node before tail
    let cur = head;
    while (cur.next && cur.next.next){
      cur = cur.next;
    }
    if (cur.next) cur.next = null;
  } else {
    grow--;
  }
}

// Game over handler
function gameOver(){
  running = false;
  clearInterval(tickInterval);
  setTimeout(()=>{
    const restart = confirm('Game Over — score: '+score+'. Restart?');
    if (restart) restartGame();
    else {
      // leave game paused with resume option
      pauseBtn.textContent = '▶ Resume';
    }
  }, 90);
}

// Drawing helpers
let foodPulseTimer = 0;
function draw(){
  // clear
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid lines
  ctx.lineWidth = 1;
  ctx.strokeStyle = GRID_LINE;
  for (let i=0;i<=COLS;i++){
    ctx.beginPath();
    ctx.moveTo(i*CELL+0.5,0);
    ctx.lineTo(i*CELL+0.5,canvas.height);
    ctx.stroke();
  }
  for (let j=0;j<=ROWS;j++){
    ctx.beginPath();
    ctx.moveTo(0,j*CELL+0.5);
    ctx.lineTo(canvas.width, j*CELL+0.5);
    ctx.stroke();
  }

  // draw food (pulse)
  if (food){
    foodPulseTimer = (foodPulseTimer + 0.12) % (Math.PI*2);
    const pulse = 1 + 0.12 * Math.sin(foodPulseTimer);
    const cx = food.x * CELL + CELL/2;
    const cy = food.y * CELL + CELL/2;
    ctx.save();
    ctx.shadowBlur = 18 * (pulse - 0.88);
    ctx.shadowColor = FOOD_COLOR;
    ctx.fillStyle = FOOD_COLOR;
    const size = Math.max(6, (CELL-6) * 0.5 * pulse);
    ctx.beginPath();
    ctx.arc(cx, cy, size/1.2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // snake: head stronger glow
  let cur = head;
  let idx = 0;
  while(cur){
    const x = cur.x * CELL;
    const y = cur.y * CELL;

    if (idx === 0){
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = SNAKE_HEAD;
      ctx.fillStyle = SNAKE_HEAD;
      roundRectFill(x+1,y+1,CELL-2,CELL-2, Math.max(4, CELL * 0.12));
      ctx.restore();
    } else {
      ctx.save();
      ctx.shadowBlur = 6;
      ctx.shadowColor = SNAKE_BODY;
      ctx.fillStyle = SNAKE_BODY;
      roundRectFill(x+1,y+1,CELL-2,CELL-2, Math.max(3, CELL * 0.1));
      ctx.restore();
    }

    cur = cur.next;
    idx++;
  }
}

// helper: rounded rect fill
function roundRectFill(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
  ctx.fill();
}

// Tick loop (fixed FPS)
function tick(){
  if (!running) return;
  advance();
  draw();
}

// start / restart / pause
function startGame(){
  initSnake(4);
  placeFood();
  score = 0;
  scoreDisplay.textContent = score;
  direction = { x:1, y:0 };
  nextDirection = { x:1, y:0 };
  grow = 0;
  running = true;
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(tick, 1000 / FPS); // fixed speed (constant)
  pauseBtn.textContent = '⏸ Pause';
  draw();
}

function restartGame(){
  if (tickInterval) clearInterval(tickInterval);
  head = null;
  startGame();
}

function togglePause(){
  running = !running;
  if (running){
    if (tickInterval) clearInterval(tickInterval);
    tickInterval = setInterval(tick, 1000 / FPS);
    pauseBtn.textContent = '⏸ Pause';
  } else {
    clearInterval(tickInterval);
    pauseBtn.textContent = '▶ Resume';
  }
}

// Input handling (keyboard)
window.addEventListener('keydown', (e) => {
  const map = {
    'ArrowUp': {x:0,y:-1}, 'ArrowDown': {x:0,y:1},
    'ArrowLeft': {x:-1,y:0}, 'ArrowRight': {x:1,y:0},
    'w': {x:0,y:-1}, 's': {x:0,y:1}, 'a': {x:-1,y:0}, 'd': {x:1,y:0},
    'W': {x:0,y:-1}, 'S': {x:0,y:1}, 'A': {x:-1,y:0}, 'D': {x:1,y:0}
  };

  if (e.key === ' '){
    e.preventDefault();
    togglePause();
    return;
  }
  if (e.key === 'r' || e.key === 'R'){
    restartGame();
    return;
  }

  if (map[e.key]){
    const nd = map[e.key];
    // prevent 180° reversal
    if (!(nd.x === -direction.x && nd.y === -direction.y)){
      nextDirection = nd;
    }
  }
});

// Buttons
restartBtn.addEventListener('click', ()=> restartGame());
pauseBtn.addEventListener('click', ()=> togglePause());

// Touch swipe controls for mobile
let touchStart = null;
canvas.addEventListener('touchstart', (e)=>{
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
});
canvas.addEventListener('touchend', (e)=>{
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) > Math.abs(dy)){
    if (dx > 20 && !(direction.x === -1 && direction.y === 0)) nextDirection = { x:1,y:0 };
    else if (dx < -20 && !(direction.x === 1 && direction.y === 0)) nextDirection = { x:-1,y:0 };
  } else {
    if (dy > 20 && !(direction.x === 0 && direction.y === -1)) nextDirection = { x:0,y:1 };
    else if (dy < -20 && !(direction.x === 0 && direction.y === 1)) nextDirection = { x:0,y:-1 };
  }
});

// initialize & start
startGame();

// ensure canvas size correct at start (and on orientation change)
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
resizeCanvas();

</script>
</body>
</html>
